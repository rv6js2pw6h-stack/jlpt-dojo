  <script>window.PAYWALL_CONFIG={level:"N2",appName:"N2 道場",storeKey:"n2dojo-fr.unlocked",code:"N2-FR-G1R9",stripeLink:"https://jlptdojo2026.gumroad.com/l/mzuhrd",accent:"#ff5064",totalPoints:182,demoQs:[{q:"その計画＿＿＿、全員が強く反対した。",ctx:"Tout le monde s'est fermement opposé au plan.",o:["に対して","について","において","によって"],a:0,e:"〜に対して = réaction dirigée vers une cible. 〜について ne ferait que poser un thème, sans nuance d'opposition."},{q:"試験に合格した＿＿＿、すぐに家族に電話した。",ctx:"À peine avait-il réussi l'examen qu'il a appelé sa famille.",o:["とたんに","ために","ながら","ところで"],a:0,e:"〜とたんに = au moment même où / à peine X que Y (enchaînement immédiat)."},{q:"出発＿＿＿、荷物の最終確認をしてください。",ctx:"Avant de partir, veuillez vérifier vos bagages une dernière fois.",o:["に先立って","にあたって","に際して","によって"],a:0,e:"〜に先立って = préalablement à / avant X (fait en amont, pas simultané)."},{q:"都会の生活は便利な＿＿＿、家賃が高い。",ctx:"La vie urbaine est pratique, mais le loyer est élevé.",o:["のに対して","のに","にもかかわらず","ながらも"],a:0,e:"〜のに対して oppose deux propositions : pratique d'un côté, loyer élevé de l'autre."},{q:"彼は天才＿＿＿、努力も欠かさない。",ctx:"Comme on pouvait s'y attendre d'un génie, il ne néglige pas l'effort.",o:["だけあって","にしては","としては","ならでは"],a:0,e:"〜だけあって = comme on peut s'y attendre de (un génie) — la réalité confirme les attentes."},{q:"日本語は難しい。＿＿＿、あきらめたくない。",ctx:"Le japonais est difficile. Cela dit, je ne veux pas abandonner.",o:["とはいえ","そのため","したがって","すると"],a:0,e:"〜とはいえ = cela dit / même si (reconnaît la difficulté tout en la contrebalançant)."},{q:"努力＿＿＿、成功はない。",ctx:"Sans effort, pas de succès.",o:["なくして","なしで","ないで","なくて"],a:0,e:"〜なくして = sans X, Y est impossible. Plus formel et littéraire que なしで."},{q:"彼の笑顔＿＿＿、場の空気が和んだ。",ctx:"Grâce à son sourire, l'atmosphère s'est détendue.",o:["によって","に対して","について","において"],a:0,e:"〜によって (cause/moyen) : par son sourire / grâce à lui, l'atmosphère s'est détendue."},{q:"子供＿＿＿、この問題が解けた。",ctx:"Même un enfant a pu résoudre ce problème.",o:["でさえ","でも","だって","さえ"],a:0,e:"〜でさえ = même (un enfant) — souligne un cas extrême ou inattendu."},{q:"彼女は医者＿＿＿、患者に冷たい。",ctx:"Pour une médecin, elle est froide avec ses patients.",o:["にしては","だけあって","として","ならでは"],a:0,e:"〜にしては = pour quelqu'un qui est (médecin) — la réalité ne correspond pas aux attentes."}]};</script>
