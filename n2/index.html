  <script>window.PAYWALL_CONFIG={level:"N2",appName:"N2 道場",storeKey:"n2dojo.unlocked",code:"N2-X9K4P2",stripeLink:"https://jlptdojo2026.gumroad.com/l/pvkhvn",accent:"#ff5064",totalPoints:182,demoQs:[{q:"その計画＿＿＿、全員が強く反対した。",ctx:"Everyone strongly opposed the plan.",o:["に対して","について","において","によって"],a:0,e:"〜に対して = reaction directed at a target. 〜について would merely mark a topic, without the nuance of opposition."},{q:"試験に合格した＿＿＿、すぐに家族に電話した。",ctx:"The moment he passed the exam, he called his family.",o:["とたんに","ために","ながら","ところで"],a:0,e:"〜とたんに = the very moment that / no sooner had X happened than Y."},{q:"出発＿＿＿、荷物の最終確認をしてください。",ctx:"Before departing, please do a final check of your luggage.",o:["に先立って","にあたって","に際して","によって"],a:0,e:"〜に先立って = prior to / before X (done in advance, not simultaneous)."},{q:"都会の生活は便利な＿＿＿、家賃が高い。",ctx:"Urban life is convenient, but rent is expensive.",o:["のに対して","のに","にもかかわらず","ながらも"],a:0,e:"〜のに対して contrasts two propositions: convenient on one hand, expensive on the other."},{q:"彼は天才＿＿＿、努力も欠かさない。",ctx:"As expected of a genius, he never neglects effort either.",o:["だけあって","にしては","としては","ならでは"],a:0,e:"〜だけあって = as expected from / as befits (his talent justifies the observation)."},{q:"日本語は難しい。＿＿＿、あきらめたくない。",ctx:"Japanese is difficult. That said, I don't want to give up.",o:["とはいえ","そのため","したがって","すると"],a:0,e:"〜とはいえ = that said / even so (acknowledges the difficulty while countering it)."},{q:"努力＿＿＿、成功はない。",ctx:"Without effort, there is no success.",o:["なくして","なしで","ないで","なくて"],a:0,e:"〜なくして = without X, Y is impossible. More formal and literary than なしで."},{q:"彼の笑顔＿＿＿、場の空気が和んだ。",ctx:"Thanks to his smile, the atmosphere relaxed.",o:["によって","に対して","について","において"],a:0,e:"〜によって (cause/means): through/because of his smile, the atmosphere relaxed."},{q:"子供＿＿＿、この問題が解けた。",ctx:"Even a child could solve this problem.",o:["でさえ","でも","だって","さえ"],a:0,e:"〜でさえ = even (a child) — emphasises an extreme or unexpected case."},{q:"彼女は医者＿＿＿、患者に冷たい。",ctx:"For a doctor, she is cold towards her patients.",o:["にしては","だけあって","として","ならでは"],a:0,e:"〜にしては = for someone who is (a doctor) — the reality doesn't match expectations."}]};</script>
