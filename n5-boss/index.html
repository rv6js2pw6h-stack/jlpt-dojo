  <style>
    .brand-mark,.tab.is-active,.btn.big,#pw-lvl,#pw-btn,.botnav-btn.is-active{background:linear-gradient(135deg,#43c97f,#22a05a)!important;box-shadow:0 4px 18px rgba(34,160,90,.38)!important}
    .btn.big{color:#fff!important;border:none!important}
    .chip.streak svg path{stroke:#43c97f!important}
    /* ---- bannière Boss Battle (dashboard) ---- */
    .boss-banner{position:relative;display:flex;align-items:center;gap:16px;margin-top:18px;cursor:pointer;
      border-radius:20px;padding:18px 20px;overflow:hidden;border:1px solid #3a2b4e;
      background:linear-gradient(125deg,#2a1d44 0%,#3a1f2a 60%,#4a2030 100%);
      transition:transform .22s cubic-bezier(.2,.7,.3,1),box-shadow .22s}
    .boss-banner:hover{transform:translateY(-3px);box-shadow:0 12px 38px rgba(120,60,160,.35)}
    .boss-banner:active{transform:scale(.99)}
    .boss-banner .bb-glow{position:absolute;inset:0;pointer-events:none;
      background:radial-gradient(420px 180px at 12% 120%,rgba(255,180,84,.28),transparent 60%),
                 radial-gradient(320px 160px at 95% -20%,rgba(180,90,220,.3),transparent 60%)}
    .boss-banner-emoji{position:relative;flex-shrink:0;width:64px;height:64px;border-radius:18px;
      display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#c93a2b,#7b2d2d);box-shadow:0 6px 20px rgba(201,58,43,.45)}
    .boss-banner-emoji span{font-family:'Noto Sans JP',sans-serif;font-size:2rem;font-weight:700;color:#fff;
      animation:bossBob 2.6s ease-in-out infinite}
    @keyframes bossBob{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-5px) rotate(3deg)}}
    .boss-banner-txt{position:relative;flex:1;min-width:0}
    .boss-banner-txt .bb-kick{font-size:.68rem;font-weight:800;letter-spacing:.14em;color:#ffce54;font-family:'Noto Sans JP',sans-serif}
    .boss-banner-txt h3{font-size:1.2rem;font-weight:800;color:#fff;margin:2px 0 3px}
    .boss-banner-txt p{font-size:.84rem;color:#c9b8d8;line-height:1.45}
    .boss-banner-cta{position:relative;flex-shrink:0;font-weight:800;font-size:.9rem;color:#1a1a1a;
      background:#fff;padding:10px 16px;border-radius:12px;white-space:nowrap}
    @media(max-width:540px){.boss-banner-cta{display:none}.boss-banner-txt p{display:none}}
  </style>
