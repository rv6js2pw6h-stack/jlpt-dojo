<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, viewport-fit=cover" />
  <title>N2 Vocabulary — JLPT N2 語彙 道場</title>
  <meta name="description" content="Master JLPT N2 vocabulary with SRS, fill-in-the-blank sentences, flashcards, and speed challenge." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0c0f16" />
  <link rel="apple-touch-icon" href="../icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="N2 語彙" />
</head>
<body>
  <header class="topbar">
    <div class="brand" id="brand" role="button" tabindex="0" title="Home">
      <span class="brand-mark">N2</span>
      <span class="brand-name">語彙 道場<small>Vocabulary</small></span>
    </div>

    <nav class="tabs" id="tabs" aria-label="Main navigation">
      <button class="tab is-active" data-view="dashboard">Dashboard</button>
      <button class="tab" data-view="practice">Study</button>
      <button class="tab" data-view="flash">Cards</button>
      <button class="tab" data-view="challenge">Challenge</button>
      <button class="tab" data-view="reference">Dictionary</button>
    </nav>

    <div class="topbar-right">
      <button class="chip streak" id="streakChip" title="Study streak">
        <svg viewBox="0 0 24 24" class="ic"><path d="M12 2c1 3-1 4-2 6-1 2 0 4 2 4 1.5 0 2-1 2-2 2 1.5 3 3.5 3 5.5A5.5 5.5 0 0 1 6.5 21 6 6 0 0 1 4 13c0-3 2-5 3-7 1.5 1 2 2 2 3 1-2 2-4 3-7Z"/></svg>
        <span id="streakNum">0</span>
      </button>
      <button class="icon-btn" id="themeBtn" title="Toggle theme" aria-label="Theme">
        <svg viewBox="0 0 24 24" class="ic" id="themeIc"><path d="M21 12.8A8.5 8.5 0 0 1 11.2 3 7 7 0 1 0 21 12.8Z"/></svg>
      </button>
      <button class="icon-btn" id="settingsBtn" title="Settings" aria-label="Settings">
        <svg viewBox="0 0 24 24" class="ic"><path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9 4a7 7 0 0 0-.1-1.2l2-1.6-2-3.4-2.4 1a7 7 0 0 0-2-1.2l-.4-2.6H9.9l-.4 2.6a7 7 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.6A7 7 0 0 0 3 12c0 .4 0 .8.1 1.2l-2 1.6 2 3.4 2.4-1a7 7 0 0 0 2 1.2l.4 2.6h4.2l.4-2.6a7 7 0 0 0 2-1.2l2.4 1 2-3.4-2-1.6c.1-.4.1-.8.1-1.2Z"/></svg>
      </button>
    </div>
  </header>

  <main id="main">
    <section id="view-dashboard" class="view"></section>
    <section id="view-practice" class="view hidden"></section>
    <section id="view-flash" class="view hidden"></section>
    <section id="view-challenge" class="view hidden"></section>
    <section id="view-reference" class="view hidden"></section>
  </main>

  <nav class="bottomnav" id="bottomnav" aria-label="Mobile navigation"></nav>

  <div id="modalRoot"></div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <noscript><p style="padding:2rem;text-align:center">JavaScript is required to run this app.</p></noscript>

  <script src="vocab-n2.js?v=520"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").catch(function () {});
      });
    }
  </script>
</body>
</html>
